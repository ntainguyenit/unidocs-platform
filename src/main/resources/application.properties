spring.application.name=unidocs

# H2 Database / Neon PostgreSQL (Use DB_URL env var if available, else H2)
spring.datasource.url=${DB_URL:jdbc:h2:mem:unidocsdb}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA Settings
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Multipart File Upload Config (Max 5000MB for ZIP Import)
spring.servlet.multipart.max-file-size=5000MB
spring.servlet.multipart.max-request-size=5000MB

# Supabase Storage Configuration (S3 Compatible)
supabase.s3.endpoint=${SUPABASE_S3_ENDPOINT:}
supabase.s3.region=${SUPABASE_S3_REGION:ap-southeast-1}
supabase.s3.access-key=${SUPABASE_S3_ACCESS_KEY:}
supabase.s3.secret-key=${SUPABASE_S3_SECRET_KEY:}
supabase.s3.bucket=${SUPABASE_S3_BUCKET:documents}

# Cloudflare Turnstile
spring.config.import=optional:file:src/main/resources/application-secrets.properties
cloudflare.turnstile.site-key=${TURNSTILE_SITE_KEY:}
cloudflare.turnstile.secret-key=${TURNSTILE_SECRET_KEY:}
# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=600s

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
