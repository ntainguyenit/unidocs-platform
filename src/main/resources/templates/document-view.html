<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head(${document.title} + ' | UniDocs')}"></head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    
    <div th:replace="~{fragments/base :: navbar}"></div>

    <main class="flex-grow container mx-auto px-4 py-4 md:py-6 flex flex-col h-full">
        
        <!-- Breadcrumb -->
        <nav class="flex text-sm text-gray-500 mb-4" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-3 whitespace-nowrap overflow-x-auto pb-2">
                <li class="inline-flex items-center">
                    <a th:href="@{/}" class="hover:text-primary transition-colors flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                        Trang chủ
                    </a>
                </li>
                <li>
                    <div class="flex items-center">
                        <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                        <a th:href="@{/course/{slug}(slug=${document.course.slug})}" class="ml-1 hover:text-primary transition-colors font-medium" th:text="${document.course.name}">Học phần</a>
                    </div>
                </li>
                <li>
                    <div class="flex items-center">
                        <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                        <span class="ml-1 text-text font-medium truncate max-w-[150px] sm:max-w-xs" th:text="${document.title}">Tài liệu</span>
                    </div>
                </li>
            </ol>
        </nav>

        <!-- Header -->
        <div class="bg-white rounded-lg shadow-sm border border-divider p-4 mb-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <div class="flex items-start gap-4 overflow-hidden w-full">
                <div class="flex flex-col items-center gap-2">
                    <div class="w-12 h-12 flex items-center justify-center rounded shrink-0"
                         th:classappend="${document.fileType.name() == 'PDF' ? 'bg-red-50 text-red-600' : (document.fileType.name() == 'DOCX' ? 'bg-blue-50 text-blue-600' : 'bg-orange-50 text-orange-600')}">
                        <span class="font-bold text-xs" th:text="${document.fileType.name()}">PDF</span>
                    </div>
                    <button onclick="history.back()" class="text-[10px] md:text-xs text-blue-600 hover:text-blue-800 flex items-center gap-1 font-medium transition-colors bg-blue-50 hover:bg-blue-100 px-3 py-1.5 md:px-4 md:py-2 rounded-md border border-blue-100 w-full justify-center shadow-sm">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Quay lại
                    </button>
                </div>
                <div class="min-w-0 mt-0.5">
                    <h1 class="text-xl font-bold text-text truncate" th:text="${document.title}">Tên tài liệu</h1>
                    <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mt-1.5 text-sm text-gray-500">
                        <span th:text="${#numbers.formatDecimal(document.fileSize / 1024.0 / 1024.0, 1, 2)} + ' MB'">2.5 MB</span>
                        <span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg> <span th:text="${document.views} + ' lượt xem'">120 lượt xem</span></span>
                        <span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> <span th:text="${document.downloads} + ' lượt tải'">45 lượt tải</span></span>
                    </div>
                </div>
            </div>
            <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 w-full sm:w-auto mt-4 sm:mt-0">
                <button type="button" th:onclick="'openReportModal(' + ${document.id} + ')'" class="px-4 py-2 bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 font-medium rounded transition-colors flex items-center justify-center gap-2 whitespace-nowrap">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    Báo cáo
                </button>
                <a th:href="${document.fileType.name() == 'DOCX' or document.fileType.name() == 'PPTX' ? 'https://docs.google.com/viewer?url=' + document.storageUrl : document.storageUrl}" target="_blank" class="px-4 py-2 bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 font-medium rounded transition-colors flex items-center justify-center gap-2 whitespace-nowrap">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                    Mở thẻ mới
                </a>
                <a th:href="@{/document/{slug}/download(slug=${document.slug})}" class="btn btn-primary flex items-center justify-center gap-2 whitespace-nowrap">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Tải xuống
                </a>
            </div>
        </div>

        <!-- Viewer Container -->
        <div class="bg-white rounded-lg shadow-sm border border-divider flex-grow relative min-h-[60vh] flex items-center justify-center overflow-hidden">
            <iframe th:if="${document.fileType.name() == 'DOCX' or document.fileType.name() == 'PPTX'}" 
                    th:src="'https://docs.google.com/viewer?url=' + ${document.storageUrl} + '&embedded=true'" 
                    class="w-full h-full absolute inset-0 border-0">
            </iframe>
            
            <iframe th:if="${document.fileType.name() == 'PDF'}" 
                    th:src="${document.storageUrl} + '#toolbar=0'" 
                    class="w-full h-full absolute inset-0 border-0">
            </iframe>
            
            <div th:if="${document.fileType.name() == 'IMAGE'}" class="w-full h-full overflow-auto bg-gray-100 flex items-center justify-center p-4 absolute inset-0">
                <img th:src="${document.storageUrl}" class="max-w-full max-h-full object-contain shadow-sm bg-white" />
            </div>
                 
            <div th:if="${document.fileType.name() == 'OTHER'}" class="text-center p-8 absolute inset-0 flex flex-col items-center justify-center">
                <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <p class="mb-4 text-gray-600 font-medium">Định dạng file này không hỗ trợ xem trực tiếp.</p>
                <a th:href="@{/document/{slug}/download(slug=${document.slug})}" class="btn btn-primary inline-block">Tải xuống ngay</a>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/base :: footer}"></div>
    <div th:replace="~{fragments/base :: scripts}"></div>

    <script>
        // Update the button click handler to pass the ID
        document.querySelector('button[onclick="openReportModal()"]').setAttribute('onclick', 'openReportModal(' + document.getElementById('reportDocumentId')?.value + ')');
    </script>
</body>
</html>
