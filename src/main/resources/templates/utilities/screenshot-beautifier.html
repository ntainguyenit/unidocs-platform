<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/base :: head('Làm đẹp ảnh chụp màn hình | UniDocs')}"></div>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .checkered-bg {
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), 
                              linear-gradient(135deg, #e5e7eb 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
                              linear-gradient(135deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 0, 10px -10px, 0px 10px;
            background-color: white;
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen text-text">
    
    <div th:replace="~{fragments/base :: navbar}"></div>

    <main class="flex-grow container mx-auto px-4 py-8">
        <a th:href="@{/}" class="inline-flex items-center text-sm text-blue-600 hover:text-blue-800 font-medium transition-colors bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-lg border border-blue-100 mb-6 shadow-sm w-fit">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Quay l?i
        </a>
        <nav class="flex text-sm text-gray-500 mb-6" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-3">
                <li class="inline-flex items-center">
                    <a th:href="@{/}" class="hover:text-primary transition-colors flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                        Trang chủ
                    </a>
                </li>
                <li>
                    <div class="flex items-center">
                        <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                        <span class="ml-1 md:ml-2 text-text font-medium">Làm đẹp ảnh chụp màn hình</span>
                    </div>
                </li>
            </ol>
        </nav>

        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Làm đẹp ảnh chụp màn hình</h1>
            <p class="text-gray-500 mt-2">Biến bức ảnh chụp màn hình nhàm chán của bạn thành một kiệt tác với viền bo tròn, bóng đổ và hình nền cực chất.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Sidebar Controls -->
            <div class="lg:col-span-1 space-y-6 bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-fit">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Tải ảnh lên</label>
                    <input type="file" id="imageUpload" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Hình nền (Gradient)</label>
                    <div class="grid grid-cols-4 gap-2" id="bgSelectors">
                        <!-- Gradients populated by JS -->
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Khoảng cách viền (Padding)</label>
                    <input type="range" id="paddingInput" min="20" max="100" value="40" class="w-full accent-primary">
                    <div class="text-xs text-gray-500 text-right mt-1" id="paddingVal">40px</div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Bo góc ảnh (Border Radius)</label>
                    <input type="range" id="radiusInput" min="0" max="40" value="12" class="w-full accent-primary">
                    <div class="text-xs text-gray-500 text-right mt-1" id="radiusVal">12px</div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Đổ bóng (Shadow)</label>
                    <input type="range" id="shadowInput" min="0" max="50" value="20" class="w-full accent-primary">
                    <div class="text-xs text-gray-500 text-right mt-1" id="shadowVal">20px</div>
                </div>

                <div class="flex items-center">
                    <input id="macOsDots" type="checkbox" checked class="w-4 h-4 text-primary bg-gray-100 border-gray-300 rounded focus:ring-primary focus:ring-2">
                    <label for="macOsDots" class="ml-2 text-sm font-medium text-gray-700">Hiển thị nút macOS</label>
                </div>

                <button id="downloadBtn" class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg transition-colors flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                    Tải ảnh xuống
                </button>
            </div>

            <!-- Preview Area -->
            <div class="lg:col-span-3 bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <div class="text-sm font-medium text-gray-700 mb-4 px-2">Xem trước (Preview)</div>
                <div class="flex-grow checkered-bg rounded-lg flex items-center justify-center p-8 overflow-auto min-h-[500px]">
                    <canvas id="previewCanvas" class="max-w-full h-auto drop-shadow-xl border border-gray-200"></canvas>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/base :: footer}"></div>
    <div th:replace="~{fragments/base :: scripts}"></div>

    <script>
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const imageUpload = document.getElementById('imageUpload');
        const paddingInput = document.getElementById('paddingInput');
        const radiusInput = document.getElementById('radiusInput');
        const shadowInput = document.getElementById('shadowInput');
        const macOsDots = document.getElementById('macOsDots');
        const downloadBtn = document.getElementById('downloadBtn');
        const bgSelectors = document.getElementById('bgSelectors');
        
        let currentImage = null;
        let currentBgGradient = ['#8EC5FC', '#E0C3FC'];

        const gradients = [
            ['#8EC5FC', '#E0C3FC'],
            ['#FF9A9E', '#FECFEF'],
            ['#a18cd1', '#fbc2eb'],
            ['#f6d365', '#fda085'],
            ['#84fab0', '#8fd3f4'],
            ['#a1c4fd', '#c2e9fb'],
            ['#ffecd2', '#fcb69f'],
            ['#cfd9df', '#e2ebf0'],
            ['#1c92d2', '#f2fcfe'],
            ['#fccb90', '#d57eeb'],
            ['#e0c3fc', '#8ec5fc'],
            ['#ff0844', '#ffb199']
        ];

        // Init background selectors
        gradients.forEach((grad, idx) => {
            const div = document.createElement('div');
            div.className = `w-8 h-8 rounded-full cursor-pointer border-2 transition-transform hover:scale-110 ${idx === 0 ? 'border-gray-800' : 'border-transparent'}`;
            div.style.background = `linear-gradient(135deg, ${grad[0]}, ${grad[1]})`;
            div.onclick = () => {
                Array.from(bgSelectors.children).forEach(c => c.classList.replace('border-gray-800', 'border-transparent'));
                div.classList.replace('border-transparent', 'border-gray-800');
                currentBgGradient = grad;
                renderCanvas();
            };
            bgSelectors.appendChild(div);
        });

        // Load default text on canvas
        ctx.fillStyle = '#6b7280';
        ctx.font = '16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Vui lòng tải ảnh lên', canvas.width/2 || 150, canvas.height/2 || 75);

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const imgObj = new Image();
                imgObj.onload = () => {
                    currentImage = imgObj;
                    renderCanvas();
                };
                imgObj.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        [paddingInput, radiusInput, shadowInput, macOsDots].forEach(el => {
            el.addEventListener('input', () => {
                document.getElementById('paddingVal').innerText = paddingInput.value + 'px';
                document.getElementById('radiusVal').innerText = radiusInput.value + 'px';
                document.getElementById('shadowVal').innerText = shadowInput.value + 'px';
                renderCanvas();
            });
        });

        function renderCanvas() {
            if (!currentImage) return;

            const padding = parseInt(paddingInput.value);
            const radius = parseInt(radiusInput.value);
            const shadow = parseInt(shadowInput.value);
            const hasDots = macOsDots.checked;
            const topBarHeight = hasDots ? 40 : 0;

            const imgW = currentImage.width;
            const imgH = currentImage.height;

            canvas.width = imgW + padding * 2;
            canvas.height = imgH + padding * 2 + topBarHeight;

            // Draw Background
            const grd = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grd.addColorStop(0, currentBgGradient[0]);
            grd.addColorStop(1, currentBgGradient[1]);
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Setup Shadow
            ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
            ctx.shadowBlur = shadow * 3;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = shadow;

            // Draw Inner Window Background
            const winX = padding;
            const winY = padding;
            const winW = imgW;
            const winH = imgH + topBarHeight;

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.roundRect(winX, winY, winW, winH, radius);
            ctx.fill();

            // Reset shadow before drawing image so it doesn't leak
            ctx.shadowColor = 'transparent';

            // Draw Top Bar (macOS)
            if (hasDots) {
                const dotY = winY + 20;
                ctx.fillStyle = '#ff5f56';
                ctx.beginPath(); ctx.arc(winX + 20, dotY, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ffbd2e';
                ctx.beginPath(); ctx.arc(winX + 40, dotY, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#27c93f';
                ctx.beginPath(); ctx.arc(winX + 60, dotY, 6, 0, Math.PI*2); ctx.fill();
            }

            // Draw Image (clipped to border radius)
            ctx.save();
            ctx.beginPath();
            ctx.roundRect(winX, winY + topBarHeight, imgW, imgH, [hasDots ? 0 : radius, hasDots ? 0 : radius, radius, radius]);
            ctx.clip();
            ctx.drawImage(currentImage, winX, winY + topBarHeight, imgW, imgH);
            ctx.restore();
        }

        downloadBtn.addEventListener('click', () => {
            if (!currentImage) {
                alert('Vui lòng tải ảnh lên trước!');
                return;
            }
            const link = document.createElement('a');
            link.download = 'beautified-screenshot.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
