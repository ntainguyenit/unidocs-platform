<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/base :: head('Vòng quay may mắn | UniDocs')}"></div>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #wheelCanvas {
            transition: transform 5s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform: rotate(0deg);
        }
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ef4444; /* red-500 */
            z-index: 10;
            filter: drop-shadow(0 4px 3px rgb(0 0 0 / 0.3));
        }
    </style>
    <!-- Confetti JS for celebration -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen text-text">
    
    <div th:replace="~{fragments/base :: navbar}"></div>

    <main class="flex-grow container mx-auto px-4 py-8">
        <nav class="flex text-sm text-gray-500 mb-6" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-3">
                <li class="inline-flex items-center">
                    <a th:href="@{/}" class="hover:text-primary transition-colors flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                        Trang chủ
                    </a>
                </li>
                <li>
                    <div class="flex items-center">
                        <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                        <span class="ml-1 md:ml-2 text-text font-medium">Vòng quay may mắn</span>
                    </div>
                </li>
            </ol>
        </nav>

        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-900">Vòng quay may mắn</h1>
            <p class="text-gray-500 mt-2">Nhập danh sách và quay để chọn ra một kết quả ngẫu nhiên.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Sidebar Controls -->
            <div class="lg:col-span-1 space-y-6 bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-fit">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Danh sách lựa chọn (mỗi dòng 1 tên)</label>
                    <textarea id="itemsInput" rows="10" class="block p-3 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-primary focus:border-primary" placeholder="Nhập tên...
Ví dụ:
Ăn phở
Ăn bún
Ăn cơm
Nhịn đói">Nguyễn Văn A
Trần Thị B
Lê Văn C
Phạm Thị D
Hoàng Văn E
Vũ Thị F</textarea>
                </div>
                
                <button onclick="updateWheel()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2.5 px-4 rounded-lg transition-colors">
                    Cập nhật vòng quay
                </button>
            </div>

            <!-- Wheel Area -->
            <div class="lg:col-span-2 bg-white p-8 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center justify-center relative overflow-hidden">
                
                <div class="relative w-[400px] h-[400px] max-w-full">
                    <div class="pointer"></div>
                    <canvas id="wheelCanvas" width="400" height="400" class="w-full h-full rounded-full drop-shadow-xl border-4 border-white"></canvas>
                    
                    <!-- Center button -->
                    <button id="spinBtn" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-20 h-20 bg-white rounded-full shadow-lg border-4 border-gray-100 flex items-center justify-center font-bold text-xl text-primary hover:scale-105 transition-transform z-20 cursor-pointer focus:outline-none">
                        QUAY
                    </button>
                </div>
                
            </div>
        </div>
    </main>

    <!-- Winner Modal -->
    <div id="winnerModal" class="fixed inset-0 z-[100] flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-gray-900/50 backdrop-blur-sm"></div>
        <div class="bg-white rounded-2xl shadow-2xl z-10 w-full max-w-md p-8 text-center transform scale-95 transition-all duration-300">
            <div class="text-5xl mb-4">🎉</div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Chúc mừng!</h2>
            <p class="text-gray-500 mb-6">Kết quả vòng quay là:</p>
            <div id="winnerText" class="text-4xl font-black text-primary mb-8 break-words">Kết quả</div>
            <button onclick="closeWinnerModal()" class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-colors">
                Tiếp tục quay
            </button>
        </div>
    </div>

    <div th:replace="~{fragments/base :: footer}"></div>
    <div th:replace="~{fragments/base :: scripts}"></div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const itemsInput = document.getElementById('itemsInput');
        const spinBtn = document.getElementById('spinBtn');
        const winnerModal = document.getElementById('winnerModal');
        const winnerText = document.getElementById('winnerText');

        let items = [];
        let currentDeg = 0;
        let isSpinning = false;

        const colors = [
            '#ef4444', '#f97316', '#f59e0b', '#84cc16', 
            '#10b981', '#06b6d4', '#3b82f6', '#6366f1', 
            '#8b5cf6', '#d946ef', '#f43f5e'
        ];

        function getItems() {
            return itemsInput.value.split('\n').map(i => i.trim()).filter(i => i !== '');
        }

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            items = getItems();
            
            if (items.length === 0) {
                ctx.beginPath();
                ctx.arc(200, 200, 200, 0, 2 * Math.PI);
                ctx.fillStyle = '#e5e7eb';
                ctx.fill();
                ctx.fillStyle = '#6b7280';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Danh sách rỗng', 200, 200);
                return;
            }

            const sliceAngle = (2 * Math.PI) / items.length;

            for (let i = 0; i < items.length; i++) {
                ctx.beginPath();
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 200, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.save();

                // Draw text
                ctx.translate(200, 200);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px Arial';
                // Adjust text position
                let text = items[i];
                if(text.length > 20) text = text.substring(0, 17) + '...';
                ctx.fillText(text, 180, 5);
                ctx.restore();
            }
        }

        function updateWheel() {
            if(isSpinning) return;
            drawWheel();
        }

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            items = getItems();
            if (items.length === 0) return;

            isSpinning = true;
            spinBtn.classList.add('opacity-50', 'cursor-not-allowed');

            // Tính toán góc quay ngẫu nhiên (tối thiểu 5 vòng + random)
            const spinRevolutions = 5 + Math.random() * 5;
            const extraDeg = Math.random() * 360;
            const totalDeg = spinRevolutions * 360 + extraDeg;
            
            currentDeg += totalDeg;
            canvas.style.transform = `rotate(${currentDeg}deg)`;

            setTimeout(() => {
                isSpinning = false;
                spinBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                
                // Tính toán kết quả
                // Vòng quay quay theo chiều kim đồng hồ, nhưng góc tính bằng CSS là độ.
                // Kim chỉ nằm ở góc 270 độ (đỉnh trên cùng).
                // Phải tính góc thực tế đã quay modulo 360
                const actualDeg = currentDeg % 360;
                
                // Mặc định CSS quay kim đồng hồ. 
                // Slice 0 bắt đầu từ 0 độ (hướng 3h), quay đến sliceAngle.
                // Để kim (hướng 12h, góc 270) chỉ vào đâu:
                // Công thức = (360 - actualDeg + 270) % 360
                const pointerDeg = (630 - actualDeg) % 360;
                
                const sliceAngleDeg = 360 / items.length;
                const winnerIndex = Math.floor(pointerDeg / sliceAngleDeg);
                
                const winner = items[winnerIndex];
                showWinnerModal(winner);

            }, 5000); // 5s transition
        });

        function showWinnerModal(text) {
            winnerText.innerText = text;
            winnerModal.classList.remove('hidden');
            // Bắn pháo hoa
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 },
                zIndex: 1000
            });
        }

        function closeWinnerModal() {
            winnerModal.classList.add('hidden');
        }

        // Init
        drawWheel();
    </script>
</body>
</html>
