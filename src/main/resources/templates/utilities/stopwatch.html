<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/base :: head('Đồng hồ bấm giờ | UniDocs')}"></div>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tabular-nums { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen text-text">
    
    <div th:replace="~{fragments/base :: navbar}"></div>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-xl">
        <nav class="flex text-sm text-gray-500 mb-6" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-3">
                <li class="inline-flex items-center">
                    <a th:href="@{/}" class="hover:text-primary transition-colors flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                        Trang chủ
                    </a>
                </li>
                <li>
                    <div class="flex items-center">
                        <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                        <span class="ml-1 md:ml-2 text-text font-medium">Đồng hồ bấm giờ</span>
                    </div>
                </li>
            </ol>
        </nav>

        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-900">Đồng hồ bấm giờ</h1>
            <p class="text-gray-500 mt-2">Đo thời gian chính xác cho các hoạt động học tập, làm bài thi hoặc thể dục.</p>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center">
            
            <div class="text-center py-8">
                <div id="display" class="text-7xl md:text-8xl font-light text-gray-900 tabular-nums tracking-tight">
                    00:00<span class="text-4xl md:text-5xl text-gray-400">.00</span>
                </div>
            </div>

            <div class="flex gap-4 w-full justify-center mb-8">
                <button id="lapBtn" disabled class="w-20 h-20 rounded-full bg-gray-100 text-gray-600 font-medium hover:bg-gray-200 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    Vòng
                </button>
                <button id="startBtn" class="w-20 h-20 rounded-full bg-green-100 text-green-700 font-bold hover:bg-green-200 transition-colors">
                    Bắt đầu
                </button>
            </div>

            <!-- Laps -->
            <div class="w-full border-t border-gray-100 pt-4">
                <ul id="lapsList" class="max-h-64 overflow-y-auto space-y-2">
                    <!-- Lap items -->
                </ul>
            </div>
            
        </div>
    </main>

    <div th:replace="~{fragments/base :: footer}"></div>
    <div th:replace="~{fragments/base :: scripts}"></div>

    <script>
        const display = document.getElementById('display');
        const startBtn = document.getElementById('startBtn');
        const lapBtn = document.getElementById('lapBtn');
        const lapsList = document.getElementById('lapsList');

        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval;
        let isRunning = false;
        let laps = [];

        function formatTime(time) {
            let date = new Date(time);
            let m = date.getUTCMinutes().toString().padStart(2, '0');
            let s = date.getUTCSeconds().toString().padStart(2, '0');
            let ms = Math.floor(date.getUTCMilliseconds() / 10).toString().padStart(2, '0');
            return `${m}:${s}<span class="text-4xl md:text-5xl text-gray-400">.${ms}</span>`;
        }

        function formatLapTime(time) {
            let date = new Date(time);
            let m = date.getUTCMinutes().toString().padStart(2, '0');
            let s = date.getUTCSeconds().toString().padStart(2, '0');
            let ms = Math.floor(date.getUTCMilliseconds() / 10).toString().padStart(2, '0');
            return `${m}:${s}.${ms}`;
        }

        function printTime() {
            display.innerHTML = formatTime(elapsedTime);
        }

        function start() {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                printTime();
            }, 10);
            
            startBtn.innerText = 'Dừng';
            startBtn.className = 'w-20 h-20 rounded-full bg-red-100 text-red-700 font-bold hover:bg-red-200 transition-colors';
            
            lapBtn.innerText = 'Vòng';
            lapBtn.disabled = false;
            
            isRunning = true;
        }

        function stop() {
            clearInterval(timerInterval);
            
            startBtn.innerText = 'Tiếp tục';
            startBtn.className = 'w-20 h-20 rounded-full bg-green-100 text-green-700 font-bold hover:bg-green-200 transition-colors';
            
            lapBtn.innerText = 'Đặt lại';
            isRunning = false;
        }

        function reset() {
            clearInterval(timerInterval);
            elapsedTime = 0;
            laps = [];
            printTime();
            lapsList.innerHTML = '';
            
            startBtn.innerText = 'Bắt đầu';
            startBtn.className = 'w-20 h-20 rounded-full bg-green-100 text-green-700 font-bold hover:bg-green-200 transition-colors';
            
            lapBtn.innerText = 'Vòng';
            lapBtn.disabled = true;
            isRunning = false;
        }

        function lap() {
            laps.unshift(elapsedTime); // add to front
            renderLaps();
        }

        function renderLaps() {
            lapsList.innerHTML = '';
            laps.forEach((lapTime, idx) => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center py-3 border-b border-gray-50 text-gray-600 font-medium tabular-nums px-2';
                
                // Calculate difference from previous lap
                let diffTime = lapTime;
                if (idx < laps.length - 1) {
                    diffTime = lapTime - laps[idx + 1];
                }

                li.innerHTML = `
                    <span class="text-gray-400">Vòng ${laps.length - idx}</span>
                    <span class="text-gray-400 text-sm">+${formatLapTime(diffTime)}</span>
                    <span class="text-gray-900">${formatLapTime(lapTime)}</span>
                `;
                lapsList.appendChild(li);
            });
        }

        startBtn.addEventListener('click', () => {
            if (isRunning) {
                stop();
            } else {
                start();
            }
        });

        lapBtn.addEventListener('click', () => {
            if (isRunning) {
                lap();
            } else {
                reset();
            }
        });
    </script>
</body>
</html>
