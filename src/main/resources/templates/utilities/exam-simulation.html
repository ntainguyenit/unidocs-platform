<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/base :: head('Phòng thi mô phỏng | UniDocs')}"></div>
    <!-- Include PDF.js for preview -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
</head>
<body class="bg-gray-50 flex flex-col h-screen overflow-hidden text-text">
    
    <div th:replace="~{fragments/base :: navbar}"></div>

    <main class="flex-grow container mx-auto px-4 py-8 flex items-center justify-center min-h-[calc(100vh-64px)]">
        <div class="flex flex-col md:flex-row w-full max-w-6xl bg-white rounded-2xl shadow-xl border border-divider overflow-hidden h-[800px] max-h-[85vh]">
            <!-- Lề trái: Vùng đề thi (Drag & Drop) -->
            <div class="w-full md:w-2/3 border-b md:border-b-0 md:border-r border-divider bg-gray-50 flex flex-col h-full relative" id="examDropZone">
            
            <div id="dropPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center transition-all">
                <div class="w-24 h-24 bg-blue-50 text-primary rounded-full flex items-center justify-center mb-4 border-2 border-dashed border-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold mb-2">Kéo thả Đề thi vào đây</h2>
                <p class="text-gray-500">Hỗ trợ file PDF và các định dạng hình ảnh (JPG, PNG)</p>
                <button type="button" onclick="document.getElementById('fileInput').click()" class="mt-6 btn btn-outline px-6 py-2">
                    Hoặc chọn file từ máy tính
                </button>
                <input type="file" id="fileInput" class="hidden" accept="application/pdf,image/*">
            </div>

            <!-- Vùng hiển thị nội dung -->
            <div id="viewerContainer" class="hidden w-full h-full overflow-auto bg-gray-100 p-4">
                <div id="pdfViewer" class="flex flex-col items-center gap-4"></div>
                <img id="imageViewer" class="max-w-full h-auto mx-auto shadow-md hidden" />
            </div>
            
            <div id="overlay" class="hidden absolute inset-0 bg-blue-50/90 backdrop-blur-sm z-10 flex items-center justify-center border-4 border-primary border-dashed">
                <p class="text-2xl font-bold text-primary">Thả file để xem</p>
            </div>
        </div>

        <!-- Lề phải: Bảng điều khiển thời gian -->
        <div class="w-full md:w-1/3 bg-white flex flex-col h-full p-6 lg:p-8 relative">
            <div class="flex items-center justify-between mb-6 border-b border-gray-100 pb-3">
                <h2 class="text-xl font-bold flex items-center gap-2 text-gray-800">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Bảng điều khiển
                </h2>
                <button onclick="history.back()" class="text-xs text-blue-600 hover:text-blue-800 flex items-center gap-1 font-medium transition-colors bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-md border border-blue-100 shadow-sm shrink-0">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Quay lại
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-divider p-6 mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Thời gian làm bài:</label>
                <select id="timeSelect" class="w-full form-input rounded-md border-gray-300 focus:border-primary focus:ring focus:ring-primary focus:ring-opacity-50 mb-4">
                    <option value="15">15 phút (Test)</option>
                    <option value="45">45 phút</option>
                    <option value="60">60 phút</option>
                    <option value="90" selected>90 phút</option>
                    <option value="120">120 phút</option>
                </select>

                <button id="startBtn" class="w-full btn btn-primary py-3 text-lg font-bold">
                    Bắt đầu làm bài
                </button>
            </div>

            <div class="flex-grow flex flex-col justify-center items-center">
                <div class="text-center relative">
                    <!-- Vòng tròn sinh tử -->
                    <svg class="w-64 h-64 transform -rotate-90">
                        <circle cx="128" cy="128" r="120" stroke="currentColor" stroke-width="8" fill="transparent" class="text-gray-200" />
                        <circle id="timerCircle" cx="128" cy="128" r="120" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="754" stroke-dashoffset="0" class="text-primary transition-all duration-1000 ease-linear" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="countdownDisplay" class="text-6xl font-black text-gray-800 font-mono">00:00</span>
                        <span id="statusText" class="text-sm text-gray-500 mt-2 font-medium uppercase tracking-wider">Chưa bắt đầu</span>
                    </div>
                </div>
            </div>

            <button id="stopBtn" class="mt-6 w-full btn bg-red-100 text-red-600 hover:bg-red-200 py-3 font-bold hidden transition-colors">
                Nộp bài sớm
            </button>
        </div>
        </div>
    </main>

    <!-- Modal Cảnh báo -->
    <div id="alertModal" class="fixed inset-0 z-[100] flex items-center justify-center hidden">
        <div class="absolute inset-0 backdrop-blur-sm" style="background-color: rgba(0,0,0,0.5);" onclick="closeAlert()"></div>
        <div class="bg-white rounded-xl shadow-2xl z-10 w-full max-w-md p-6 transition-all duration-300" id="alertModalContent">
            <div class="flex items-center justify-center w-16 h-16 rounded-full bg-orange-100 text-orange-500 mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="text-2xl font-bold text-center mb-2" id="alertTitle">Cảnh báo</h3>
            <p class="text-gray-600 text-center mb-6" id="alertMessage">Nội dung cảnh báo</p>
            <button onclick="closeAlert()" class="w-full btn btn-primary py-2">Đã hiểu</button>
        </div>
    </div>

    <!-- Âm thanh -->
    <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <audio id="finishSound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" preload="auto"></audio>

    <script>
        // Logic Đếm ngược
        let timerInterval;
        let totalSeconds = 0;
        let remainingSeconds = 0;
        let halfTimeAlerted = false;
        let fifteenMinAlerted = false;
        const circle = document.getElementById('timerCircle');
        const circumference = 2 * Math.PI * 120; // 753.98
        circle.style.strokeDasharray = `${circumference} ${circumference}`;

        function updateDisplay() {
            const m = Math.floor(remainingSeconds / 60);
            const s = remainingSeconds % 60;
            document.getElementById('countdownDisplay').textContent = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            
            // Cập nhật vòng tròn
            const offset = circumference - (remainingSeconds / totalSeconds) * circumference;
            circle.style.strokeDashoffset = offset;

            // Đổi màu khi sắp hết giờ
            if (remainingSeconds <= 300) { // 5 phút cuối
                circle.classList.remove('text-primary', 'text-orange-500');
                circle.classList.add('text-red-500');
                document.getElementById('countdownDisplay').classList.add('text-red-600', 'animate-pulse');
            } else if (remainingSeconds <= 900 && totalSeconds > 900) { // 15 phút
                circle.classList.remove('text-primary');
                circle.classList.add('text-orange-500');
            }

            // Cảnh báo
            if (!halfTimeAlerted && remainingSeconds <= totalSeconds / 2 && totalSeconds > 0) {
                showAlert("Đã trôi qua một nửa thời gian", "Hãy kiểm tra lại tốc độ làm bài của bạn nhé!");
                halfTimeAlerted = true;
            }
            if (!fifteenMinAlerted && remainingSeconds === 900 && totalSeconds > 900) {
                showAlert("Chỉ còn 15 phút", "Hãy nhanh chóng hoàn thiện và kiểm tra lại bài làm!");
                fifteenMinAlerted = true;
            }
            if (remainingSeconds === 0 && totalSeconds > 0) {
                window.isFormDirty = false;
                clearInterval(timerInterval);
                document.getElementById('statusText').textContent = "HẾT GIỜ";
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('stopBtn').style.display = 'none';
                document.getElementById('finishSound').play();
                showAlert("Hết giờ làm bài!", "Vui lòng dừng bút/chuột và nộp bài.");
            }
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            window.isFormDirty = true;
            const minutes = parseInt(document.getElementById('timeSelect').value);
            totalSeconds = minutes * 60;
            remainingSeconds = totalSeconds;
            halfTimeAlerted = false;
            fifteenMinAlerted = false;
            
            circle.classList.remove('text-red-500', 'text-orange-500');
            circle.classList.add('text-primary');
            document.getElementById('countdownDisplay').classList.remove('text-red-600', 'animate-pulse');
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('statusText').textContent = "Đang làm bài";
            document.getElementById('timeSelect').disabled = true;

            clearInterval(timerInterval);
            updateDisplay();
            timerInterval = setInterval(() => {
                remainingSeconds--;
                updateDisplay();
            }, 1000);
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            window.isFormDirty = false;
            clearInterval(timerInterval);
            remainingSeconds = 0;
            updateDisplay();
            document.getElementById('statusText').textContent = "Đã nộp bài";
            document.getElementById('timeSelect').disabled = false;
        });

        function showAlert(title, message) {
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMessage').textContent = message;
            const modal = document.getElementById('alertModal');
            const content = document.getElementById('alertModalContent');
            modal.classList.remove('hidden');
            document.getElementById('alertSound').play().catch(e=>console.log(e));
        }

        function closeAlert() {
            const modal = document.getElementById('alertModal');
            if (modal) modal.classList.add('hidden');
        }

        // Logic Drag & Drop
        const dropZone = document.getElementById('examDropZone');
        const overlay = document.getElementById('overlay');
        const fileInput = document.getElementById('fileInput');
        const dropPlaceholder = document.getElementById('dropPlaceholder');
        const viewerContainer = document.getElementById('viewerContainer');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => overlay.classList.remove('hidden'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => overlay.classList.add('hidden'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) handleFiles(this.files);
        });

        function handleDrop(e) {
            let dt = e.dataTransfer;
            let files = dt.files;
            handleFiles(files);
        }

        function handleFiles(files) {
            const file = files[0];
            if (!file) return;

            dropPlaceholder.classList.add('hidden');
            viewerContainer.classList.remove('hidden');

            if (file.type === 'application/pdf') {
                document.getElementById('imageViewer').classList.add('hidden');
                document.getElementById('pdfViewer').innerHTML = ''; // Clear old
                const fileReader = new FileReader();
                fileReader.onload = function() {
                    const typedarray = new Uint8Array(this.result);
                    renderPDF(typedarray);
                };
                fileReader.readAsArrayBuffer(file);
            } else if (file.type.startsWith('image/')) {
                document.getElementById('pdfViewer').innerHTML = '';
                const img = document.getElementById('imageViewer');
                img.classList.remove('hidden');
                img.src = URL.createObjectURL(file);
            } else {
                alert('Chỉ hỗ trợ file PDF hoặc Hình ảnh!');
                dropPlaceholder.classList.remove('hidden');
                viewerContainer.classList.add('hidden');
            }
        }

        async function renderPDF(data) {
            const pdf = await pdfjsLib.getDocument(data).promise;
            const container = document.getElementById('pdfViewer');
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                const viewport = page.getViewport({scale: 1.5});
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                canvas.className = 'shadow-md bg-white rounded max-w-full';
                container.appendChild(canvas);

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                page.render(renderContext);
            }
        }
        // Khởi tạo kéo thả
        setupDragAndDrop();
    </script>
    <div th:replace="~{fragments/base :: scripts}"></div>
</body>
</html>
