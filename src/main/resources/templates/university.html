<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head(${university.name} + ' | UniDocs')}"></head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    
    <div th:replace="~{fragments/base :: navbar}"></div>

    <main class="flex-grow container mx-auto px-4 py-8">
        
        <nav class="flex text-sm text-gray-500 mb-6" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-3">
                <li class="inline-flex items-center">
                    <a th:href="@{/}" class="hover:text-primary transition-colors flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                        Trang chủ
                    </a>
                </li>
                <li>
                    <div class="flex items-center">
                        <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                        <span class="ml-1 md:ml-2 text-text font-medium" th:text="${university.name}">Đại học</span>
                    </div>
                </li>
            </ol>
        </nav>

        <div class="bg-white rounded-lg shadow-sm border border-divider p-6 mb-8 flex justify-between items-center">
            <div class="flex items-start gap-4">
                <div class="flex flex-col items-center gap-2">
                    <div class="w-20 h-20 flex items-center justify-center p-2 border border-gray-100 rounded bg-gray-50 shrink-0">
                        <img th:if="${university.logoUrl}" th:src="${university.logoUrl}" alt="Logo" class="w-full h-full object-contain" />
                        <div th:unless="${university.logoUrl}" class="bg-blue-600 text-white rounded-full w-16 h-16 flex items-center justify-center font-bold text-2xl shadow-inner">
                            <span th:text="${#strings.substring(university.shortName,0,2)}"></span>
                        </div>
                    </div>
                    <button onclick="history.back()" class="text-xs text-blue-600 hover:text-blue-800 flex items-center gap-1 font-medium transition-colors bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-md border border-blue-100 w-full justify-center shadow-sm">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Quay lại
                    </button>
                </div>
                <div class="mt-1">
                    <h1 class="text-2xl font-bold text-text leading-tight" th:text="${university.name}">Đại học</h1>
                    <p class="text-gray-500 mt-1.5">Danh sách các khoa trực thuộc</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex bg-gray-100 p-1 rounded-md shrink-0">
                    <button id="btnGridView" onclick="toggleView('grid')" class="p-1.5 rounded bg-white shadow-sm text-primary transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
                    </button>
                    <button id="btnListView" onclick="toggleView('list')" class="p-1.5 rounded text-gray-500 hover:text-gray-700 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
                    </button>
                </div>
                <button onclick="window.location.reload();" class="hidden md:flex items-center gap-2 px-4 py-2 bg-gray-100 text-gray-600 rounded-md hover:bg-blue-50 hover:text-primary transition-colors text-sm font-medium focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    Làm mới trang
                </button>
            </div>
        </div>

        <div id="dataContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 transition-all duration-300">
            <a th:each="faculty : ${faculties}" th:href="@{/faculty/{slug}(slug=${faculty.slug})}" class="card group hover:-translate-y-1 hover:shadow-md transition-all cursor-pointer">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="text-lg font-bold text-text group-hover:text-primary transition-colors" th:text="${faculty.name}">Tên khoa</h3>
                        <p class="text-sm text-gray-500 mt-1">
                            <span th:text="${faculty.courses.size()}"></span> Học phần
                        </p>
                    </div>
                    <div class="text-gray-300 group-hover:text-primary transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </div>
                </div>
            </a>
        </div>

    </main>

    <script>
        // Sort items initially based on initial DOM order to store it
        let initialOrder = [];
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('dataContainer');
            if(container) {
                initialOrder = Array.from(container.children);
            }
        });

        function toggleView(view) {
            const container = document.getElementById('dataContainer');
            if(!container) return;
            const btnGrid = document.getElementById('btnGridView');
            const btnList = document.getElementById('btnListView');
            
            let items = Array.from(container.children);
            
            if (view === 'list') {
                container.className = 'flex flex-col gap-3 transition-all duration-300';
                btnList.classList.add('bg-white', 'shadow-sm', 'text-primary');
                btnList.classList.remove('text-gray-500', 'hover:text-gray-700');
                btnGrid.classList.remove('bg-white', 'shadow-sm', 'text-primary');
                btnGrid.classList.add('text-gray-500', 'hover:text-gray-700');
                
                // Sort A-Z
                items.sort((a, b) => {
                    const textA = a.querySelector('h3').textContent.trim();
                    const textB = b.querySelector('h3').textContent.trim();
                    return textA.localeCompare(textB, 'vi');
                });
            } else {
                container.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 transition-all duration-300';
                btnGrid.classList.add('bg-white', 'shadow-sm', 'text-primary');
                btnGrid.classList.remove('text-gray-500', 'hover:text-gray-700');
                btnList.classList.remove('bg-white', 'shadow-sm', 'text-primary');
                btnList.classList.add('text-gray-500', 'hover:text-gray-700');
                
                // Restore initial order
                items = initialOrder.length > 0 ? [...initialOrder] : items;
            }
            
            container.innerHTML = '';
            items.forEach(item => container.appendChild(item));
        }
    </script>

    <div th:replace="~{fragments/base :: footer}"></div>
    <div th:replace="~{fragments/base :: scripts}"></div>
</body>
</html>
