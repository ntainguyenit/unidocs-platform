<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head(${faculty.name} + ' - ' + ${faculty.university.shortName} + ' | UniDocs')}"></head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    
    <div th:replace="~{fragments/base :: navbar}"></div>

    <main class="flex-grow container mx-auto px-4 py-8">
        
        <!-- Breadcrumb -->
        <nav class="flex text-sm text-gray-500 mb-6" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-3">
                <li class="inline-flex items-center">
                    <a th:href="@{/}" class="hover:text-primary transition-colors flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                        Trang chủ
                    </a>
                </li>
                <li>
                    <div class="flex items-center">
                        <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                        <a th:href="@{/university/{slug}(slug=${faculty.university.slug})}" class="ml-1 md:ml-2 hover:text-primary transition-colors font-medium" th:text="${faculty.university.name}">Đại học</a>
                    </div>
                </li>
                <li>
                    <div class="flex items-center">
                        <svg class="w-6 h-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                        <span class="ml-1 md:ml-2 text-text font-medium" th:text="${faculty.name}">Khoa</span>
                    </div>
                </li>
            </ol>
        </nav>

        <!-- Header -->
        <div class="bg-white rounded-lg shadow-sm border border-divider p-6 mb-8 flex items-start gap-4">
            <div class="flex flex-col items-center gap-2">
                <div class="w-16 h-16 flex items-center justify-center rounded-full bg-blue-50 text-primary shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                <button onclick="history.back()" class="text-xs text-blue-600 hover:text-blue-800 flex items-center gap-1 font-medium transition-colors bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-md border border-blue-100 w-full justify-center shadow-sm">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Quay lại
                </button>
            </div>
            <div class="mt-1">
                <h1 class="text-2xl font-bold text-text leading-tight" th:text="${faculty.name}">Tên khoa</h1>
                <p class="text-gray-500 mt-1.5" th:text="'Thuộc ' + ${faculty.university.name}">Thuộc trường</p>
            </div>
        </div>

        <!-- Courses Grid -->
        <div class="mb-4 flex justify-between items-end border-b border-divider pb-2">
            <h2 class="text-xl font-bold text-text">Danh sách Học phần (<span th:text="${courses.size()}">0</span>)</h2>
            <div class="flex items-center gap-3">
                <div class="flex bg-gray-100 p-1 rounded-md shrink-0">
                    <button id="btnGridView" onclick="toggleView('grid')" class="p-1.5 rounded bg-white shadow-sm text-primary transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
                    </button>
                    <button id="btnListView" onclick="toggleView('list')" class="p-1.5 rounded text-gray-500 hover:text-gray-700 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
                    </button>
                </div>
            </div>
        </div>
        
        <div id="dataContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 transition-all duration-300">
            <a th:each="course : ${courses}" th:id="${course.slug}" th:href="@{/course/{slug}(slug=${course.slug})}" class="card p-4 group hover:-translate-y-1 hover:shadow-md transition-all cursor-pointer">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="text-base font-bold text-text group-hover:text-primary transition-colors" th:text="${course.name}">Tên học phần</h3>
                    </div>
                </div>
            </a>
        </div>

    </main>

    <script>
        let initialOrder = [];
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('dataContainer');
            if(container) {
                initialOrder = Array.from(container.children);
            }
        });

        function toggleView(view) {
            const container = document.getElementById('dataContainer');
            if(!container) return;
            const btnGrid = document.getElementById('btnGridView');
            const btnList = document.getElementById('btnListView');
            
            let items = Array.from(container.children);
            
            if (view === 'list') {
                container.className = 'flex flex-col gap-3 transition-all duration-300';
                btnList.classList.add('bg-white', 'shadow-sm', 'text-primary');
                btnList.classList.remove('text-gray-500', 'hover:text-gray-700');
                btnGrid.classList.remove('bg-white', 'shadow-sm', 'text-primary');
                btnGrid.classList.add('text-gray-500', 'hover:text-gray-700');
                
                items.sort((a, b) => {
                    const textA = a.querySelector('h3').textContent.trim();
                    const textB = b.querySelector('h3').textContent.trim();
                    return textA.localeCompare(textB, 'vi');
                });
            } else {
                container.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 transition-all duration-300';
                btnGrid.classList.add('bg-white', 'shadow-sm', 'text-primary');
                btnGrid.classList.remove('text-gray-500', 'hover:text-gray-700');
                btnList.classList.remove('bg-white', 'shadow-sm', 'text-primary');
                btnList.classList.add('text-gray-500', 'hover:text-gray-700');
                
                items = initialOrder.length > 0 ? [...initialOrder] : items;
            }
            
            container.innerHTML = '';
            items.forEach(item => container.appendChild(item));
        }
    </script>
    <div th:replace="~{fragments/base :: footer}"></div>
    <div th:replace="~{fragments/base :: scripts}"></div>
</body>
</html>
